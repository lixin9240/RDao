components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object

    ListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: array
          items:
            type: object

    FileDescriptionRequest:
      type: object
      properties:
        projectType:
          type: string
          maxLength: 50
          description: 项目类型
        countryCode:
          type: string
          maxLength: 10
          description: 国家/地区代码
        fileCategoryId:
          type: integer
          description: 文件大类ID
        fileSubcategoryId:
          type: integer
          description: 文件小类ID
        fileNameTemplate:
          type: string
          maxLength: 255
          nullable: true
          description: 文件名称模板
        fileCodeRule:
          type: string
          maxLength: 100
          nullable: true
          description: 文件编号规则
        internalCode:
          type: string
          maxLength: 50
          nullable: true
          description: 内部代码
        authRole:
          type: string
          maxLength: 100
          nullable: true
          description: 授权角色
        sortOrder:
          type: integer
          nullable: true
          description: 排序权重
        status:
          type: integer
          nullable: true
          enum: [0, 1]
          description: 状态 1-有效 0-无效
      required:
        - projectType
        - countryCode
        - fileCategoryId
        - fileSubcategoryId

    FileCategoryRequest:
      type: object
      properties:
        sortOrder:
          type: integer
          nullable: true
          description: 排序权重
        name:
          type: string
          maxLength: 100
          description: 分类名称
        parentId:
          type: integer
          nullable: true
          description: 父级分类ID
        level:
          type: integer
          nullable: true
          description: 层级深度
        status:
          type: integer
          nullable: true
          enum: [0, 1]
          description: 状态 1-有效 0-无效
      required:
        - name

    PriceIndexRequest:
      type: object
      properties:
        sortOrder:
          type: integer
          nullable: true
          description: 排序权重
        indexName:
          type: string
          maxLength: 100
          description: 指数名称
        description:
          type: string
          maxLength: 255
          nullable: true
          description: 描述
        status:
          type: integer
          nullable: true
          enum: [0, 1]
          description: 状态 1-有效 0-无效
      required:
        - indexName

    InnovationIndexRequest:
      type: object
      properties:
        sortOrder:
          type: integer
          nullable: true
          description: 排序权重
        indexName:
          type: string
          maxLength: 100
          description: 指数名称
        description:
          type: string
          maxLength: 255
          nullable: true
          description: 描述
        status:
          type: integer
          nullable: true
          enum: [0, 1]
          description: 状态 1-有效 0-无效
      required:
        - indexName

    IndustrialParkRequest:
      type: object
      properties:
        sortOrder:
          type: integer
          nullable: true
          description: 排序权重
        parkName:
          type: string
          maxLength: 100
          description: 园区名称
        parkCode:
          type: string
          maxLength: 50
          nullable: true
          description: 园区编码
        address:
          type: string
          maxLength: 255
          nullable: true
          description: 园区地址
        contactPerson:
          type: string
          maxLength: 50
          nullable: true
          description: 联系人
        contactPhone:
          type: string
          maxLength: 20
          nullable: true
          description: 联系电话
        description:
          type: string
          maxLength: 255
          nullable: true
          description: 描述
        status:
          type: integer
          nullable: true
          enum: [0, 1]
          description: 状态 1-有效 0-无效
      required:
        - parkName
