openapi: 3.0.3
info:
  title: 字典管理接口
  description: 文件描述、文件分类、价格指数、创新指数、工业园区字典接口文档
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8000/api/v1
    description: 本地开发环境

security:
  - BearerAuth: []

paths:
  /file-descriptions:
    get:
      tags:
        - 文件描述
      summary: 获取文件描述列表
      operationId: fileDescriptionList
      parameters:
        - name: status
          in: query
          description: 状态筛选 1-有效 0-无效
          schema:
            type: integer
            enum: [0, 1]
        - name: keyword
          in: query
          description: 按文件名称模板模糊搜索
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
              example:
                code: 0
                message: success
                data:
                  - id: 1
                    projectType: 专利申请
                    countryCode: CN
                    fileCategoryId: 1
                    fileSubcategoryId: 2
                    fileNameTemplate: 专利申请书-{日期}
                    fileCodeRule: ZL-{序号}
                    internalCode: INT-001
                    authRole: admin
                    sortOrder: 1
                    status: 1
                    createdAt: "2026-06-27 10:00:00"
                    updatedAt: "2026-06-27 10:00:00"
    post:
      tags:
        - 文件描述
      summary: 创建文件描述
      operationId: fileDescriptionStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileDescriptionRequest'
            example:
              projectType: 专利申请
              countryCode: CN
              fileCategoryId: 1
              fileSubcategoryId: 2
              fileNameTemplate: 专利申请书-{日期}
              fileCodeRule: ZL-{序号}
              internalCode: INT-001
              authRole: admin
              sortOrder: 1
              status: 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                code: 0
                message: 创建成功
                data:
                  id: 1
                  projectType: 专利申请
                  countryCode: CN
                  fileCategoryId: 1
                  fileSubcategoryId: 2
                  fileNameTemplate: 专利申请书-{日期}
                  fileCodeRule: ZL-{序号}
                  internalCode: INT-001
                  authRole: admin
                  sortOrder: 1
                  status: 1
                  createdAt: "2026-06-27 10:00:00"
                  updatedAt: "2026-06-27 10:00:00"

  /file-descriptions/{id}:
    put:
      tags:
        - 文件描述
      summary: 修改文件描述
      operationId: fileDescriptionUpdate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileDescriptionRequest'
            example:
              projectType: 专利申请
              countryCode: US
              fileCategoryId: 1
              fileSubcategoryId: 3
              fileNameTemplate: 专利申请书-{日期}-V2
              fileCodeRule: ZL-{序号}-V2
              internalCode: INT-002
              authRole: admin,manager
              sortOrder: 2
              status: 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                code: 0
                message: 更新成功
                data:
                  id: 1
                  projectType: 专利申请
                  countryCode: US
                  fileCategoryId: 1
                  fileSubcategoryId: 3
                  fileNameTemplate: 专利申请书-{日期}-V2
                  fileCodeRule: ZL-{序号}-V2
                  internalCode: INT-002
                  authRole: admin,manager
                  sortOrder: 2
                  status: 1
    delete:
      tags:
        - 文件描述
      summary: 删除文件描述
      operationId: fileDescriptionDestroy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                code: 0
                message: 删除成功
                data: []

